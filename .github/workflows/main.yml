name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          if [ -d "./backend" ]; then
            pip install -r requirements.txt
          else
            echo "WARNING: ./backend directory does not exist. Skipping Python dependency installation."
          fi
      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          echo "No build needed for vanilla HTML/CSS/JS. Add tests here if required."
