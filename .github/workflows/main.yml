name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install Python dependencies (if backend exists)
        run: |
          if [ -d "./backend" ]; then
            pip install -r ./backend/requirements.txt
          else
            echo "WARNING: ./backend directory does not exist. Skipping Python dependency installation."
          fi

      - name: Run backend tests (if backend exists)
        run: |
          if [ -d "./backend" ]; then
            cd ./backend
            pytest || echo "No tests found or tests failed."
            cd ..
          else
            echo "WARNING: ./backend directory does not exist. Skipping backend tests."
          fi

      - name: Run frontend checks
        run: |
          echo "Running frontend checks (if any)"
          # Add any frontend validation steps here if needed
