# GitHub Actions Pipeline for AI Risk Detector Testing

name: Frontend and Backend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_ENV: production
  DB_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}

jobs:
  build-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          echo "Starting tests..."
          ls
          pytest

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "No build step required for vanilla JS/HTML/CSS"
          ls

      - name: Deployment Simulation
        run: |
          echo "Deploying build artifacts..."
          tar -czf build.tar.gz ./frontend

      - name: Cleanup
        run: |
          TEMP_DIR="/tmp/build"
          rm -rf "$TEMP_DIR"
